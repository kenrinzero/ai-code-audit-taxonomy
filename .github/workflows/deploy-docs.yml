# Builds the MkDocs Material site and deploys it to the gh-pages branch
# on every push to master. Replaces the previous manual `mkdocs gh-deploy`
# (which required mkdocs-material installed locally).
name: deploy-docs

on:
  push:
    branches: [master]
    # Only rebuild when something that affects the rendered site changes.
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write # needed to push the built site to the gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install MkDocs Material
        # Pinned to the version the site is known to build with; bump when desired.
        run: pip install "mkdocs-material==9.7.6"
      - name: Build and deploy to gh-pages
        run: mkdocs gh-deploy --force
